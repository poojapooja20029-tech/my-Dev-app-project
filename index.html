<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Dev App — Full Stack</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #e2e8f0;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      padding: 2rem;
      text-align: center;
      border-bottom: 1px solid #2d3748;
    }

    header h1 { font-size: 2rem; color: #63b3ed; }
    header p  { color: #90cdf4; margin-top: 0.5rem; }

    .status-bar {
      text-align: center;
      padding: 0.75rem;
      font-size: 0.85rem;
      background: #1a202c;
      border-bottom: 1px solid #2d3748;
    }

    .status-bar span { color: #68d391; font-weight: bold; }

    main { max-width: 960px; margin: 2rem auto; padding: 0 1rem; }

    section { margin-bottom: 3rem; }

    h2 {
      font-size: 1.4rem;
      color: #90cdf4;
      margin-bottom: 1.25rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid #2d3748;
    }

    /* ── Projects ── */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.25rem;
    }

    .project-card {
      background: #1a202c;
      border: 1px solid #2d3748;
      border-radius: 10px;
      padding: 1.25rem;
      transition: transform 0.2s, border-color 0.2s;
    }

    .project-card:hover { transform: translateY(-4px); border-color: #63b3ed; }

    .project-card h3 { color: #63b3ed; margin-bottom: 0.5rem; }
    .project-card p  { font-size: 0.9rem; color: #a0aec0; margin-bottom: 0.75rem; }

    .tags { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 0.75rem; }

    .tag {
      background: #2d3748;
      color: #90cdf4;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      font-size: 0.75rem;
    }

    .badge {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: bold;
    }

    .badge.completed  { background: #276749; color: #9ae6b4; }
    .badge.in-progress { background: #744210; color: #fbd38d; }

    .project-link {
      display: inline-block;
      margin-top: 0.5rem;
      color: #63b3ed;
      font-size: 0.85rem;
      text-decoration: none;
    }

    .project-link:hover { text-decoration: underline; }

    /* ── Contact Form ── */
    .contact-form {
      background: #1a202c;
      border: 1px solid #2d3748;
      border-radius: 10px;
      padding: 1.5rem;
      max-width: 560px;
    }

    .form-group { margin-bottom: 1rem; }

    label {
      display: block;
      margin-bottom: 0.4rem;
      font-size: 0.9rem;
      color: #90cdf4;
    }

    input, textarea {
      width: 100%;
      padding: 0.65rem 0.9rem;
      background: #2d3748;
      border: 1px solid #4a5568;
      border-radius: 6px;
      color: #e2e8f0;
      font-size: 0.95rem;
      transition: border-color 0.2s;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: #63b3ed;
    }

    textarea { resize: vertical; min-height: 120px; }

    button[type="submit"] {
      background: #3182ce;
      color: white;
      border: none;
      padding: 0.7rem 1.5rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      transition: background 0.2s;
    }

    button[type="submit"]:hover    { background: #2b6cb0; }
    button[type="submit"]:disabled { background: #4a5568; cursor: not-allowed; }

    .form-message {
      margin-top: 0.85rem;
      padding: 0.65rem 1rem;
      border-radius: 6px;
      font-size: 0.9rem;
      display: none;
    }

    .form-message.success { background: #276749; color: #9ae6b4; display: block; }
    .form-message.error   { background: #742a2a; color: #feb2b2; display: block; }

    /* ── Loading ── */
    .loading { color: #718096; font-style: italic; }

    footer {
      text-align: center;
      padding: 2rem;
      color: #4a5568;
      font-size: 0.85rem;
      border-top: 1px solid #2d3748;
    }
  </style>
</head>
<body>

  <header>
    <h1>🚀 My Dev App</h1>
    <p>Full Stack: HTML + Node.js + Express + Vercel</p>
  </header>

  <div class="status-bar">
    API Status: <span id="api-status">Checking...</span>
  </div>

  <main>

    <!-- ── Projects Section ── -->
    <section>
      <h2>📁 My Projects</h2>
      <div class="projects-grid" id="projects-container">
        <p class="loading">Loading projects from API...</p>
      </div>
    </section>

    <!-- ── Contact Section ── -->
    <section>
      <h2>📬 Contact Me</h2>
      <div class="contact-form">
        <div class="form-group">
          <label for="name">Your Name</label>
          <input type="text" id="name" placeholder="e.g. Pooja" />
        </div>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="pooja@example.com" />
        </div>
        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" placeholder="Say hello..."></textarea>
        </div>
        <button type="submit" id="submit-btn" onclick="submitContact()">Send Message</button>
        <div class="form-message" id="form-message"></div>
      </div>
    </section>

  </main>

  <footer>
    Built with ❤️ using HTML, Node.js, Express &amp; Vercel
  </footer>

  <script>
    // =============================================
    // 🔧 CONFIGURATION
    // Change this to your Vercel URL after deploying
    // =============================================
    const API_BASE = window.location.origin; // auto-detects current domain

    // ── Check API Health ──────────────────────────
    async function checkAPI() {
      try {
        const res = await fetch(`${API_BASE}/api`);
        const data = await res.json();
        document.getElementById('api-status').textContent = '✅ ' + data.message;
      } catch (err) {
        document.getElementById('api-status').textContent = '❌ API not reachable';
        document.getElementById('api-status').style.color = '#fc8181';
      }
    }

    // ── Fetch & Display Projects ──────────────────
    async function loadProjects() {
      const container = document.getElementById('projects-container');
      try {
        const res  = await fetch(`${API_BASE}/api/projects`);
        const json = await res.json();

        if (!json.success) throw new Error(json.error);

        container.innerHTML = json.data.map(project => `
          <div class="project-card">
            <h3>${project.title}</h3>
            <p>${project.description}</p>
            <div class="tags">
              ${project.tech.map(t => `<span class="tag">${t}</span>`).join('')}
            </div>
            <span class="badge ${project.status}">${project.status}</span>
            ${project.link !== '#'
              ? `<br><a class="project-link" href="${project.link}" target="_blank">🔗 View Project</a>`
              : ''}
          </div>
        `).join('');

      } catch (err) {
        container.innerHTML = `<p style="color:#fc8181;">❌ Could not load projects: ${err.message}</p>`;
      }
    }

    // ── Submit Contact Form ───────────────────────
    async function submitContact() {
      const name    = document.getElementById('name').value.trim();
      const email   = document.getElementById('email').value.trim();
      const message = document.getElementById('message').value.trim();
      const msgDiv  = document.getElementById('form-message');
      const btn     = document.getElementById('submit-btn');

      // Clear previous message
      msgDiv.className = 'form-message';
      msgDiv.textContent = '';

      // Basic frontend validation
      if (!name || !email || !message) {
        msgDiv.className = 'form-message error';
        msgDiv.textContent = '⚠️ Please fill in all fields.';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Sending...';

      try {
        const res  = await fetch(`${API_BASE}/api/contact`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, message }),
        });

        const data = await res.json();

        if (data.success) {
          msgDiv.className = 'form-message success';
          msgDiv.textContent = '✅ ' + data.message;
          // Clear the form
          document.getElementById('name').value    = '';
          document.getElementById('email').value   = '';
          document.getElementById('message').value = '';
        } else {
          throw new Error(data.error);
        }

      } catch (err) {
        msgDiv.className = 'form-message error';
        msgDiv.textContent = '❌ ' + err.message;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Send Message';
      }
    }

    // ── Init: run when page loads ─────────────────
    checkAPI();
    loadProjects();
  </script>

</body>
</html>
